<style>

body{font-family:'Prompt',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.sidebar{background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:20}.brand{height:74px;display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid var(--line)}.brand img{width:70px;height:auto}.brand-title{font-size:12px;color:var(--muted);line-height:1.35}.nav{padding:16px 12px;overflow:auto}.nav-section{font-size:11px;font-weight:700;color:#a0adbc;text-transform:uppercase;margin:18px 12px 8px}.nav-btn{width:100%;border:0;background:transparent;display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;color:#26364e;font-weight:700;font-size:14px;cursor:pointer;font-family:'Prompt',sans-serif;transition:.18s}.nav-btn:hover{background:#F1F7FD;color:var(--blue)}.nav-btn.active{background:#E8F4FD;color:var(--blue);box-shadow:inset 3px 0 0 var(--blue)}.nav-icon{font-size:20px;width:24px;text-align:center}.nav-badge{margin-left:auto;background:#FFE9E7;color:var(--red);font-size:11px;border-radius:99px;padding:2px 8px}.userbox{margin-top:auto;padding:16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}.avatar{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--sky),var(--blue));display:grid;place-items:center;color:#fff;font-weight:800}.user-name{font-size:12px;font-weight:800}.user-mail{font-size:11px;color:var(--muted)}.main{min-width:0}.topbar{height:74px;background:var(--dark);color:#fff;display:flex;align-items:center;gap:14px;padding:0 24px;position:sticky;top:0;z-index:10}.page-title{font-size:16px;font-weight:800}.crumb{font-size:12px;color:rgba(255,255,255,.55)}.spacer{flex:1}.top-actions{display:flex;align-items:center;gap:8px}.pill{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;font-family:'Prompt',sans-serif}.pill.primary{background:linear-gradient(135deg,var(--blue),var(--sky));border-color:transparent}.lang{display:flex;background:rgba(255,255,255,.1);border-radius:10px;padding:3px}.lang button{border:0;background:transparent;color:rgba(255,255,255,.6);padding:5px 9px;border-radius:8px;font-weight:800;cursor:pointer}.lang button.active{background:var(--blue);color:#fff}.content{padding:24px;max-width:1700px;margin:0 auto}.notice{background:#FFF6DE;border:1px solid #FFD17A;color:#8B5A00;border-radius:14px;padding:12px 16px;font-size:13px;margin-bottom:18px}.grid-kpi{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}.kpi-ico{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:24px}.kpi .num{font-size:34px;line-height:1;font-weight:900;color:var(--blue)}.kpi .label{font-size:13px;font-weight:800}.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.panel-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.panel-title{font-size:16px;font-weight:900}.panel-sub{font-size:12px;color:var(--muted);margin-top:3px}.panel-body{padding:18px}.layout-2{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(340px,.55fr);gap:16px;margin-bottom:18px}.map-card{background:#071828;border-radius:18px;padding:18px;color:#fff;min-height:420px}.map-wrap{height:330px;background:#081d31;border-radius:14px;overflow:hidden;position:relative}.map-wrap svg{width:100%;height:100%;display:block}.country{fill:#22364c;stroke:#31465f;stroke-width:.4}.country.active-low{fill:#4BBDE8}.country.active-mid{fill:#1A6DB5}.country.active-high{fill:#F5A623}.map-tooltip{position:absolute;display:none;background:#fff;color:#10233f;border-radius:10px;padding:8px 10px;font-size:12px;box-shadow:var(--shadow);pointer-events:none}.chart{height:250px}.bar-row{display:grid;grid-template-columns:110px 1fr 54px;gap:10px;align-items:center;margin:12px 0}.bar-name{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar-track{height:18px;background:#EDF3FA;border-radius:999px;overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--sky));min-width:3px}.bar-val{font-size:12px;font-weight:800;text-align:right}.toolbar{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:16px;padding:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}.input,.select{border:1.5px solid #DCE6F2;background:#fff;border-radius:12px;padding:11px 13px;font-family:'Prompt',sans-serif;font-size:13px;outline:none}.input:focus,.select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(75,189,232,.12)}.search{flex:1;min-width:260px}.btn{border:0;border-radius:12px;padding:11px 16px;font-family:'Prompt',sans-serif;font-weight:800;cursor:pointer;background:#E8F4FD;color:var(--blue);transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:7px}.btn:hover{transform:translateY(-1px)}.btn.primary{background:linear-gradient(135deg,var(--blue),var(--sky));color:#fff}.btn.danger{background:#FDECEA;color:var(--red)}.btn.green{background:#EBF7E3;color:var(--green)}.btn.gold{background:#FEF3DC;color:#9b6200}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 15px;font-weight:800;color:var(--muted);cursor:pointer}.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}.table-wrap{overflow:auto}.data-table{width:100%;border-collapse:separate;border-spacing:0;min-width:980px}.data-table th{background:#F4F7FB;color:#64738a;font-size:12px;text-align:left;padding:12px;border-bottom:1px solid var(--line);white-space:nowrap}.data-table td{padding:12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}.data-table tr:hover td{background:#FAFCFF}.status{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800}.status.active{background:#EBF7E3;color:var(--green)}.status.expired{background:#EEF1F5;color:#778598}.status.soon{background:#FFF4DE;color:#B46D00}.status.upcoming{background:#E8F4FD;color:var(--blue)}.actions{display:flex;gap:6px}.iconbtn{border:0;border-radius:10px;padding:8px 10px;cursor:pointer;font-weight:800}.empty{padding:34px;text-align:center;color:var(--muted)}.event-list{display:flex;flex-direction:column;gap:10px}.event-item{display:grid;grid-template-columns:54px 1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:14px}.datebox{width:54px;height:54px;background:#F1F7FD;border-radius:14px;display:grid;place-items:center;color:var(--blue);font-weight:900}.item-title{font-weight:900;font-size:13px}.item-meta{font-size:12px;color:var(--muted);margin-top:3px}.modal-backdrop{position:fixed;inset:0;background:rgba(7,24,40,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:18px}.modal-backdrop.show{display:flex}.modal{width:min(860px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.25)}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}.modal-title{font-weight:900;font-size:18px}.close{border:0;background:#F2F5F9;border-radius:10px;width:36px;height:36px;cursor:pointer}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:20px}.field label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px}.field.full{grid-column:1/-1}.form input,.form textarea,.form select{width:100%;border:1.5px solid #DCE6F2;border-radius:12px;padding:11px 12px;font-family:'Prompt',sans-serif}.form textarea{min-height:88px;resize:vertical}.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line)}.loading{padding:30px;text-align:center;color:var(--muted)}.error{background:#FDECEA;color:var(--red);border-radius:14px;padding:12px 16px;margin-bottom:14px}.mobile-menu{display:none}.hide{display:none!important}
@media(max-width:1100px){.app{grid-template-columns:86px 1fr}.brand{justify-content:center;padding:0}.brand img{width:58px}.brand-title,.nav-section,.nav-label,.user-info,.nav-badge{display:none}.nav-btn{justify-content:center;padding:14px 0}.nav-icon{font-size:22px}.userbox{justify-content:center}.grid-kpi{grid-template-columns:repeat(2,1fr)}.layout-2{grid-template-columns:1fr}.sidebar{width:86px}}
@media(max-width:760px){.app{display:block}.sidebar{position:fixed;left:-280px;width:260px;transition:.25s;box-shadow:0 20px 80px rgba(0,0,0,.25)}.sidebar.open{left:0}.brand-title,.nav-section,.nav-label,.user-info,.nav-badge{display:block}.nav-btn{justify-content:flex-start;padding:12px 14px}.topbar{height:64px;padding:0 14px}.mobile-menu{display:inline-flex}.content{padding:14px}.grid-kpi{grid-template-columns:1fr}.kpi{padding:14px}.kpi .num{font-size:28px}.toolbar{align-items:stretch}.search,.input,.select,.btn{width:100%;min-width:0}.form{grid-template-columns:1fr}.layout-2{gap:12px}.map-card{padding:12px;min-height:340px}.map-wrap{height:250px}.event-item{grid-template-columns:48px 1fr}.event-item .btn{grid-column:1/-1}.top-actions .pill:not(.primary),.lang{display:none}.page-title{font-size:14px}.crumb{display:none}.table-wrap{margin:0 -14px;padding:0 14px}.panel-head{align-items:flex-start;flex-direction:column}.sidebar{height:100dvh}.userbox{justify-content:flex-start}.brand{justify-content:flex-start;padding:0 22px}.brand img{width:70px}}

.file-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:10px;background:#E8F4FD;color:#1A6DB5;font-weight:800;text-decoration:none;font-size:12px;white-space:nowrap}
.file-btn:hover{background:#D7ECFB}
.file-empty{color:#9AA8B8;font-weight:700}
</style>

<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><img src="iroup-logo.png" alt="iROUP"><div class="brand-title">International Relations<br>Admin System</div></div>
    <nav class="nav">
      <div class="nav-section">หลัก</div>
      <button class="nav-btn active" data-page="home"><span class="nav-icon">▦</span><span class="nav-label">Dashboard</span></button>
      <div class="nav-section">ข้อมูลหลัก</div>
      <button class="nav-btn" data-page="mou"><span class="nav-icon">🤝</span><span class="nav-label">MOU ต่างประเทศ</span><span class="nav-badge" id="badgeMou">0</span></button>
      <button class="nav-btn" data-page="scholar"><span class="nav-icon">🎓</span><span class="nav-label">ทุน & กิจกรรม</span></button>
      <button class="nav-btn" data-page="travel"><span class="nav-icon">✈️</span><span class="nav-label">การเดินทาง</span></button>
      <button class="nav-btn" data-page="mobility"><span class="nav-icon">👥</span><span class="nav-label">Mobility</span></button>
      <div class="nav-section">รายงาน</div>
      <button class="nav-btn" data-page="reports"><span class="nav-icon">📊</span><span class="nav-label">รายงาน & Export</span></button>
      <div class="nav-section">อื่นๆ</div>
      <button class="nav-btn" data-page="public"><span class="nav-icon">🌐</span><span class="nav-label">Public View</span></button>
      <button class="nav-btn" data-page="settings"><span class="nav-icon">⚙️</span><span class="nav-label">ตั้งค่า</span></button>
    </nav>
    <div class="userbox"><div class="avatar" id="avatar">T</div><div class="user-info"><div class="user-name" id="userName">Admin</div><div class="user-mail" id="userMail">iROUP</div></div></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="pill mobile-menu" id="menuBtn">☰</button>
      <div><div class="crumb">งานวิเทศสัมพันธ์ · <span id="crumbPage">Dashboard</span></div><div class="page-title" id="pageTitle">Dashboard</div></div>
      <div class="spacer"></div>
      <div class="top-actions"><div class="lang"><button class="active" data-lang="th">TH</button><button data-lang="en">EN</button></div><a class="pill" href="public-landing.html" target="_blank">🌐 Public View</a><button class="pill primary" onclick="location.reload()">↻ Refresh</button></div>
    </header>
    <section class="content" id="content"><div class="loading">กำลังโหลดข้อมูล...</div></section>
  </main>
</div>
<div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal-head"><div class="modal-title" id="modalTitle">เพิ่มข้อมูล</div><button class="close" id="modalClose">✕</button></div><form id="modalForm"><div class="form" id="formFields"></div><div class="modal-foot"><button type="button" class="btn" id="modalCancel">ยกเลิก</button><button type="submit" class="btn primary" id="modalSubmit">บันทึก</button></div></form></div></div>
<script>
const SHEETS = {
  mou: IROUP.SHEETS.MOU,
  scholar: IROUP.SHEETS.SCHOLAR,
  event: IROUP.SHEETS.EVENT,
  travel: IROUP.SHEETS.TRAVEL,
  inbound: IROUP.SHEETS.INBOUND,
  outbound: IROUP.SHEETS.OUTBOUND,
};
const FIELDS = {
  mou:['หน่วยงาน_UP','องค์กร_ตปท','ประเทศ','ทวีป','ประเภท','วันเริ่ม','วันสิ้นสุด','ปีงบ','หมายเหตุ','ไฟล์_URL'],
  scholar:['ชื่อทุน','สถาบัน','ประเทศ','ระดับ','วันประชาสัมพันธ์','วันเปิดรับ','วันปิดรับ','ครอบคลุม','Link','Poster_URL','ไฟล์_URL','Pin','หมายเหตุ'],
  event:['ชื่อกิจกรรม','ประเภท','วันเริ่ม','วันสิ้นสุด','เวลาเริ่ม','เวลาสิ้นสุด','สถานที่','หน่วยงาน','จำนวน','รายละเอียด','Poster_URL','ไฟล์_URL'],
  travel:['ชื่อโครงการ','วัตถุประสงค์','วันเริ่ม','วันสิ้นสุด','ประเทศ','เมือง','จำนวน','รหัสผู้เดินทาง','ชื่อผู้เดินทาง','ปีงบ','งบประเภท','จำนวนเงิน','ไฟล์_URL','หมายเหตุ'],
  inbound:['ชื่อ','ชื่อกลาง','สกุล','เพศ','ประเภท','สถาบัน','ประเทศ','ระดับ','หน่วยงาน_UP','ภาษา','วันมาถึง','วันกลับ','โครงการ','วัตถุประสงค์','ปีงบ','งบประเภท','จำนวนเงิน','ไฟล์_URL','หมายเหตุ'],
  outbound:['รหัส','ชื่อ_สกุล','คณะ','สาขา','ประเภท','เพศ','สถาบัน_ปลายทาง','ประเทศ','วันออก','วันกลับ','โครงการ','วัตถุประสงค์','ปีงบ','งบประเภท','จำนวนเงิน','ไฟล์_URL','หมายเหตุ']
};
const labels = {home:'Dashboard',mou:'MOU ต่างประเทศ',scholar:'ทุน & กิจกรรม',travel:'การเดินทาง',mobility:'Mobility',reports:'รายงาน & Export',settings:'ตั้งค่า',public:'Public View'};
let state={page:'home', stats:null, data:{}, master:{faculty:[], country:[]}, lang:'th', activeSub:null, editing:null, query:'', searchTimer:null};
const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function asArr(res){return Array.isArray(res) ? res : (res?.data || [])}
function toDate(v){if(!v)return null;if(v instanceof Date)return v;const s=String(v).trim();let m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);if(m){let y=+m[3]; if(y>2400)y-=543; if(y<100)y+=2000; return new Date(y,+m[2]-1,+m[1]);}let d=new Date(s);return isNaN(d)?null:d}
function fmtDate(v){const d=toDate(v); if(!d)return v||'-'; return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});}
function daysBetween(a,b){return Math.ceil((b-a)/(86400000))}
function statusMou(r){const end=toDate(r['วันสิ้นสุด']); if(!end)return 'active'; const diff=daysBetween(new Date(),end); if(diff<0)return 'expired'; if(diff<=180)return 'soon'; return 'active';}
function startOfDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function statusScholar(r){
  const today=startOfDay(new Date());
  const open=toDate(r['วันเปิดรับ']);
  const close=toDate(r['วันปิดรับ']);
  const openDay=open?startOfDay(open):null;
  const closeDay=close?startOfDay(close):null;
  if(closeDay && today>closeDay) return 'expired';
  if(openDay && today<openDay) return 'upcoming';
  if(closeDay){
    const diff=daysBetween(today,closeDay);
    if(diff>=0 && diff<=30) return 'soon';
  }
  return 'active';
}
function statusText(s){return s==='active'?'Active':s==='soon'?'ใกล้หมดอายุ':s==='upcoming'?'ยังไม่เริ่ม':'หมดอายุ';}
function statusScholarText(s){return s==='active'?'Active':s==='soon'?'ใกล้ปิดรับ':s==='upcoming'?'ยังไม่เปิดรับ':'หมดอายุ';}
function fileLink(url,label='เปิด'){
  const u = String(url || '').trim();
  if(!u || u === '-' || u.toLowerCase() === 'undefined' || u.toLowerCase() === 'null') return '<span class="file-empty">-</span>';
  return `<a href="${esc(u)}" target="_blank" rel="noopener" class="file-btn">🔗 ${esc(label)}</a>`;
}

async function safe(label, fn, fallback=[]){try{return await fn()}catch(e){console.error(label,e); return fallback}}
async function loadCore(){
  state.stats = await safe('stats',()=>IROUP.getStats(),{stats:{}});
  state.stats = state.stats.stats ? state.stats.stats : state.stats;
  const keys=['mou','scholar','event','travel','inbound','outbound'];
  await Promise.all(keys.map(async k=>{state.data[k]=asArr(await safe(k,()=>IROUP.getAll(SHEETS[k]),{data:[]}));}));
  // Master data: ใช้ sheet ที่ผู้ใช้สร้างเอง ถ้าโหลดไม่ได้จะ fallback เป็นข้อมูลจากรายการที่เคยกรอก
  state.master.faculty = asArr(await safe('FACULTY',()=>IROUP.getAll('FACULTY'),{data:[]}));
  state.master.country = asArr(await safe('COUNTRY',()=>IROUP.getAll('COUNTRY'),{data:[]}));
  $('#badgeMou').textContent = state.data.mou.length;
}
function setPage(p){ if(p==='public'){window.open('public-landing.html','_blank');return} state.page=p; state.query=''; $$('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===p)); $('#pageTitle').textContent=labels[p]; $('#crumbPage').textContent=labels[p]; $('#sidebar').classList.remove('open'); render(); }
function errorBox(msg){return `<div class="error">${esc(msg)}</div>`}
function card(icon,num,label,sub,color='blue'){return `<div class="kpi"><div class="kpi-ico" style="background:${color==='green'?'#EBF7E3':color==='gold'?'#FEF3DC':color==='purple'?'#F0EBFF':'#E8F4FD'}">${icon}</div><div><div class="num" style="color:var(--${color==='blue'?'blue':color})">${num??0}</div><div class="label">${label}</div><div class="sub">${sub||''}</div></div></div>`}
function render(){ const c=$('#content'); if(!state.stats){c.innerHTML='<div class="loading">กำลังโหลดข้อมูล...</div>'; return}
  if(state.page==='home') return renderHome(); if(state.page==='mou') return renderMou(); if(state.page==='scholar') return renderScholarEvents(); if(state.page==='travel') return renderTravel(); if(state.page==='mobility') return renderMobility(); if(state.page==='reports') return renderReports(); if(state.page==='settings') return renderSettings();}
function renderHome(){const s=state.stats; const upcoming=getUpcoming().slice(0,6); $('#content').innerHTML=`
  <div class="notice">⚠️ ข้อมูลทั้งหมดในหน้านี้ดึงจาก Google Sheet จริง ไม่มี mock data หากไม่แสดงให้กด Refresh</div>
  <div class="grid-kpi">${card('🤝',s.mou?.total||0,'MOU ทั้งหมด',`${s.mou?.active||0} Active · ${s.mou?.countries||0} ประเทศ`)}${card('🎓',s.scholarship?.total||0,'ทุนการศึกษา',`${s.scholarship?.open||0} กำลังรับสมัคร`,'gold')}${card('👥',s.mobility?.total||0,'Mobility',`In ${s.inbound?.total||0} / Out ${s.outbound?.total||0}`,'purple')}${card('✈️',s.travel?.total||0,'การเดินทาง',`${s.travel?.active||0} กำลังเดินทาง`,'green')}</div>
  <div class="layout-2"><div class="map-card"><div class="panel-title">🗺️ แผนที่ความร่วมมือนานาชาติ</div><div class="panel-sub" style="color:rgba(255,255,255,.68)">${s.mou?.active||0} MOU Active · ${s.mou?.countries||0} ประเทศ</div><div class="map-wrap" id="homeMap"><div class="map-tooltip" id="mapTip"></div></div></div><div class="panel"><div class="panel-head"><div><div class="panel-title">กิจกรรม/รายการที่กำลังจะมาถึง</div><div class="panel-sub">จากทุน กิจกรรม การเดินทาง และ Mobility</div></div></div><div class="panel-body"><div class="event-list">${upcoming.length?upcoming.map(eventItem).join(''):'<div class="empty">ยังไม่มีรายการกำลังจะมาถึง</div>'}</div></div></div></div>
  <div class="layout-2"><div class="panel"><div class="panel-head"><div><div class="panel-title">Mobility ปีนี้</div><div class="panel-sub">Inbound / Outbound จากชีตจริง</div></div><button class="btn" onclick="setPage('mobility')">ดูรายละเอียด</button></div><div class="panel-body">${barChart([{name:'Inbound',value:state.data.inbound.length},{name:'Outbound',value:state.data.outbound.length}])}</div></div><div class="panel"><div class="panel-head"><div><div class="panel-title">MOU Active แยกตามประเทศ</div><div class="panel-sub">ใช้ประเทศจากชีต MOU</div></div></div><div class="panel-body">${countryBars()}</div></div></div>`; renderMap('homeMap');}
function getUpcoming(){let items=[]; state.data.scholar.forEach(r=>items.push({type:'ทุน',date:r['วันปิดรับ'],title:r['ชื่อทุน'],meta:`${r['ประเทศ']||''} · ปิดรับ ${fmtDate(r['วันปิดรับ'])}`})); state.data.event.forEach(r=>items.push({type:'กิจกรรม',date:r['วันเริ่ม'],title:r['ชื่อกิจกรรม'],meta:`${r['สถานที่']||''} · ${fmtDate(r['วันเริ่ม'])}`})); state.data.travel.forEach(r=>items.push({type:'เดินทาง',date:r['วันเริ่ม'],title:r['ชื่อโครงการ'],meta:`${r['ประเทศ']||''} ${r['เมือง']||''} · ${fmtDate(r['วันเริ่ม'])}`})); state.data.inbound.forEach(r=>items.push({type:'Inbound',date:r['วันมาถึง'],title:[r['ชื่อ'],r['สกุล']].filter(Boolean).join(' ')||r['โครงการ'],meta:`${r['ประเทศ']||''} · ${fmtDate(r['วันมาถึง'])}`})); state.data.outbound.forEach(r=>items.push({type:'Outbound',date:r['วันออก'],title:r['ชื่อ_สกุล']||r['โครงการ'],meta:`${r['ประเทศ']||''} · ${fmtDate(r['วันออก'])}`})); const now=new Date(); return items.filter(x=>toDate(x.date)&&toDate(x.date)>=new Date(now.getFullYear(),now.getMonth(),now.getDate())).sort((a,b)=>toDate(a.date)-toDate(b.date));}
function eventItem(x){const d=toDate(x.date); return `<div class="event-item"><div class="datebox">${d?d.getDate():'-'}</div><div><div class="item-title">${esc(x.title||'-')}</div><div class="item-meta">📌 ${esc(x.meta||'')}</div></div><span class="status active">${esc(x.type)}</span></div>`}
function barChart(rows){const max=Math.max(1,...rows.map(r=>+r.value||0)); return `<div class="chart">${rows.map(r=>`<div class="bar-row"><div class="bar-name">${esc(r.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(+r.value||0)/max*100)}%"></div></div><div class="bar-val">${r.value||0}</div></div>`).join('')}</div>`}
function cleanCountry(v){return String(v||'').replace(/^[A-Z]{2,3}\s+/,'').trim();}
function countryCount(){const o={}; state.data.mou.filter(r=>statusMou(r)==='active').forEach(r=>{const c=cleanCountry(r['ประเทศ']); if(c)o[c]=(o[c]||0)+1}); return o}
function countryBars(){const rows=Object.entries(countryCount()).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value); return rows.length?barChart(rows):'<div class="empty">ยังไม่มี MOU Active</div>'}
const countryAlias={
 'china':['china','cn','people','prc','จีน'], 'japan':['japan','jp','ญี่ปุ่น'], 'south korea':['south korea','korea','kr','เกาหลี'],
 'united states of america':['usa','us','united states','america','สหรัฐ'], 'australia':['australia','au','ออสเตรเลีย'],
 'france':['france','fr','ฝรั่งเศส'], 'germany':['germany','de','เยอรมนี'], 'thailand':['thailand','th','ไทย'],
 'malaysia':['malaysia','my','มาเลเซีย'], 'indonesia':['indonesia','id','อินโดนีเซีย'], 'singapore':['singapore','sg','สิงคโปร์']
};
function matchCountryName(mapName, data){let n=String(mapName).toLowerCase(); for(const [k,aliases] of Object.entries(countryAlias)){ if(n===k || aliases.some(a=>n.includes(a))) { for(const dc of Object.keys(data)){let d=cleanCountry(dc).toLowerCase(); if(d.includes(k)||aliases.some(a=>d.includes(a)))return data[dc]; } } } for(const dc of Object.keys(data)){ let d=cleanCountry(dc).toLowerCase(); if(n.includes(d)||d.includes(n))return data[dc]; } return 0;}
async function renderMap(id){const el=document.getElementById(id); if(!el)return; el.innerHTML='<div class="loading" style="color:#fff">กำลังโหลดแผนที่...</div>'; const data=countryCount(); try{const world=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'); const countries=topojson.feature(world,world.objects.countries).features; el.innerHTML='<svg></svg><div class="map-tooltip" id="mapTip"></div>'; const svg=d3.select(el).select('svg'); const w=el.clientWidth||800,h=el.clientHeight||330; const projection=d3.geoNaturalEarth1().fitSize([w,h],{type:'Sphere'}); const path=d3.geoPath(projection); const tip=el.querySelector('.map-tooltip'); svg.attr('viewBox',`0 0 ${w} ${h}`); svg.append('path').datum({type:'Sphere'}).attr('d',path).attr('fill','#081d31'); svg.selectAll('path.country').data(countries).join('path').attr('class',d=>{const v=matchCountryName(d.properties.name,data);return 'country '+(v>=8?'active-high':v>=4?'active-mid':v>=1?'active-low':'')}).attr('d',path).on('mousemove',(ev,d)=>{const v=matchCountryName(d.properties.name,data); if(!v)return; tip.style.display='block'; tip.style.left=(ev.offsetX+12)+'px'; tip.style.top=(ev.offsetY+12)+'px'; tip.innerHTML=`<b>${d.properties.name}</b><br>${v} MOU Active`;}).on('mouseleave',()=>tip.style.display='none'); }catch(e){console.error(e); el.innerHTML='<div class="empty" style="color:#b8c9da">โหลดแผนที่ไม่ได้ แต่ข้อมูลยังใช้งานได้</div>';}}
function filterRows(rows,q){q=(q||'').toLowerCase().trim(); if(!q)return rows; return rows.filter(r=>Object.values(r).join(' ').toLowerCase().includes(q));}
function renderCrudPage(opts){const rows=filterRows(opts.rows,state.query); $('#content').innerHTML=`<div class="toolbar"><input class="input search" id="searchInput" placeholder="🔍 ค้นหาจากทุกคอลัมน์..." value="${esc(state.query)}"><button class="btn primary" onclick="openForm('${opts.key}')">＋ เพิ่ม${opts.addLabel}</button><button class="btn" onclick="exportCsv('${opts.key}')">⬇ Export CSV</button><button class="btn" onclick="loadCore().then(render)">↻ โหลดใหม่</button></div><div class="panel"><div class="panel-head"><div><div class="panel-title">${opts.title}</div><div class="panel-sub">แสดง ${rows.length} รายการจาก Google Sheet จริง</div></div></div><div class="table-wrap"><table class="data-table"><thead><tr>${opts.cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}<th>จัดการ</th></tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${opts.cols.map(c=>`<td>${c.render?c.render(r):esc(r[c.key]||'-')}</td>`).join('')}<td><div class="actions"><button class="iconbtn" onclick="openForm('${opts.key}','${esc(r.ID)}')">✏️</button><button class="iconbtn" onclick="removeRow('${opts.key}','${esc(r.ID)}')">🗑️</button></div></td></tr>`).join(''):`<tr><td colspan="${opts.cols.length+1}"><div class="empty">ไม่พบข้อมูล</div></td></tr>`}</tbody></table></div></div>`; $('#searchInput').addEventListener('input',e=>{state.query=e.target.value; render();});}
function renderMou(){const s=state.stats; $('#content').innerHTML=`<div class="notice">⚠️ MOU ใกล้หมดอายุ ${s.mou?.soon||0} รายการ · ข้อมูลมาจากชีต MOU โดยตรง</div><div class="grid-kpi">${card('🤝',s.mou?.total||0,'MOU ทั้งหมด',`${s.mou?.active||0} Active`)}${card('✅',s.mou?.active||0,'Active','ยังไม่หมดอายุ','green')}${card('⏰',s.mou?.soon||0,'ใกล้หมดอายุ','ภายใน 180 วัน','gold')}${card('🌐',s.mou?.countries||0,'ประเทศ','เครือข่ายทั่วโลก')}</div><div class="layout-2"><div class="map-card"><div class="panel-title">🗺️ แผนที่ความร่วมมือนานาชาติ</div><div class="panel-sub" style="color:rgba(255,255,255,.68)">คลิก/hover เพื่อดูรายละเอียด</div><div class="map-wrap" id="mouMap"></div></div><div class="panel"><div class="panel-head"><div><div class="panel-title">MOU Active แยกตามประเทศ</div><div class="panel-sub">จากข้อมูลจริง</div></div></div><div class="panel-body">${countryBars()}</div></div></div><div id="mouTable"></div>`; renderMap('mouMap'); const old=$('#content').innerHTML; const tmp=document.createElement('div'); document.body.appendChild(tmp); state.page='mouTableOnly'; const content=$('#content'); const holder=document.createElement('div'); content.appendChild(holder); renderCrudInto(holder,{key:'mou',addLabel:' MOU',title:'รายการ MOU ทั้งหมด',rows:state.data.mou,cols:[{key:'หน่วยงาน_UP',label:'หน่วยงาน ม.พะเยา'},{key:'องค์กร_ตปท',label:'องค์กรต่างประเทศ'},{key:'ประเทศ',label:'ประเทศ'},{key:'ประเภท',label:'ประเภท'},{key:'วันสิ้นสุด',label:'สิ้นสุด',render:r=>fmtDate(r['วันสิ้นสุด'])},{key:'ไฟล์_URL',label:'ไฟล์แนบ',render:r=>fileLink(r['ไฟล์_URL'])},{key:'สถานะ',label:'สถานะ',render:r=>`<span class="status ${statusMou(r)}">${statusText(statusMou(r))}</span>`}]}); state.page='mou';}
function renderCrudInto(el,opts){
  const qid='searchInput2';
  const draw=()=>{
    const rows=filterRows(opts.rows,state.query);
    const table=`<div class="panel"><div class="panel-head"><div><div class="panel-title">${opts.title}</div><div class="panel-sub">แสดง ${rows.length} รายการ</div></div></div><div class="table-wrap"><table class="data-table"><thead><tr>${opts.cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}<th>จัดการ</th></tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${opts.cols.map(c=>`<td>${c.render?c.render(r):esc(r[c.key]||'-')}</td>`).join('')}<td><div class="actions"><button class="iconbtn" onclick="openForm('${opts.key}','${esc(r.ID)}')">✏️</button><button class="iconbtn" onclick="removeRow('${opts.key}','${esc(r.ID)}')">🗑️</button></div></td></tr>`).join(''):`<tr><td colspan="${opts.cols.length+1}"><div class="empty">ไม่พบข้อมูล</div></td></tr>`}</tbody></table></div></div>`;
    const area=el.querySelector('.crud-table-area'); if(area) area.innerHTML=table;
  };
  el.innerHTML=`<div class="toolbar"><input class="input search" id="${qid}" placeholder="🔍 ค้นหา..." value="${esc(state.query)}"><button class="btn primary" onclick="openForm('${opts.key}')">＋ เพิ่ม${opts.addLabel}</button><button class="btn" onclick="exportCsv('${opts.key}')">⬇ Export CSV</button></div><div class="crud-table-area"></div>`;
  draw();
  el.querySelector('#'+qid).addEventListener('input',e=>{
    state.query=e.target.value;
    clearTimeout(state.searchTimer);
    state.searchTimer=setTimeout(draw,180);
  });
}

  const masters=(state.master.country||[]).flatMap(c=>[c.en_name,c.th_name,c.code]).filter(Boolean);
  const used=[...state.data.mou,...state.data.scholar,...state.data.travel,...state.data.inbound,...state.data.outbound].map(r=>r['ประเทศ']).filter(Boolean);
  return uniq([...masters,...used]);
}
function findFaculty(v){const x=String(v||'').trim().toLowerCase(); return (state.master.faculty||[]).find(f=>[f.code,f.th_name,f.en_name].some(a=>String(a||'').trim().toLowerCase()===x));}
function findCountry(v){const x=String(v||'').trim().toLowerCase(); return (state.master.country||[]).find(c=>[c.code,c.th_name,c.en_name].some(a=>String(a||'').trim().toLowerCase()===x));}
function normalizeFaculty(v){const f=findFaculty(v); return f ? (f.en_name || f.th_name || v) : v;}
function normalizeCountry(v){const c=findCountry(v); return c ? (c.en_name || c.th_name || v) : v;}
function continentOfCountry(v){const c=findCountry(v); return c ? (c.continent || '') : '';}
function onCountryInput(el){const cont=continentOfCountry(el.value); const input=document.querySelector('#modalForm [name="ทวีป"]'); if(cont&&input) input.value=cont;}
function uniq(arr){return [...new Set(arr.map(x=>String(x||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'th'));}
function optionPool(field){
  const all=[...state.data.mou,...state.data.scholar,...state.data.event,...state.data.travel,...state.data.inbound,...state.data.outbound];
  const base={
    'ประเทศ':getCountryOptions(),
    'เมือง':['Phayao','Bangkok','Shanghai','Beijing','Tokyo','Nagano','Seoul','Daegu','Daejeon','Deggendorf','Paris','Sydney'],
    'คณะ':getFacultyOptions(),
    'หน่วยงาน_UP':getFacultyOptions(),
    'หน่วยงาน':getFacultyOptions(),
    'ประเภท':['MOU','MOA','LOI','Agreement','Exchange','Research','Training','Award','รับรางวัล','Inbound','Outbound','อบรม','ประชุม','ทุน','นักศึกษา','บุคลากร'],
    'ระดับ':['ป.ตรี','ป.โท','ป.เอก','บุคลากร','อาจารย์'],
    'เพศ':['ชาย','หญิง','ไม่ระบุ'],
    'ทวีป':['Asia','Europe','North America','South America','Oceania','Africa'],
    'ปีงบ':['2568','2569','2570','2571'],
    'งบประเภท':['งบประมาณแผ่นดิน','เงินรายได้','ทุนภายนอก','ไม่มีงบประมาณ']
  };
  return uniq([...(base[field]||[]), ...all.map(r=>r[field])]);
}
function fieldInput(f,row){
  let raw=row?.[f]||''; if(/วัน|date/i.test(f)){const d=toDate(raw); if(d){raw=d.toISOString().slice(0,10);}} const val=esc(raw);

  if(f === 'ครอบคลุม'){
    const options = ['ค่าเครื่องบิน','ค่าเล่าเรียน','ค่าครองชีพ','ที่พัก','ค่าที่พัก','ค่าวีซ่า','ประกัน','ค่าลงทะเบียน','ค่าหนังสือ/อุปกรณ์','อื่นๆ'];
    const rawText = String(raw||'');
    return `<div class="coverage-box" style="display:flex;flex-wrap:wrap;gap:8px">
      ${options.map(opt=>{
        const checked = rawText.includes(opt) ? 'checked' : '';
        return `<label style="display:inline-flex;align-items:center;gap:6px;background:#F4F7FB;border:1px solid #DCE6F2;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer">
          <input class="coverage-check" type="checkbox" value="${esc(opt)}" ${checked}> ${esc(opt)}
        </label>`;
      }).join('')}
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px">เลือกได้หลายรายการ ระบบจะบันทึกเป็นข้อความคั่นด้วย comma</div>`;
  }

  if(['หมายเหตุ','รายละเอียด'].includes(f)) return `<textarea name="${esc(f)}">${val}</textarea>`;

  if(f === 'Poster_URL'){
    return `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="url" name="${esc(f)}" value="${val}" placeholder="Poster/Cover URL" style="flex:1;min-width:220px">
      <input type="file" accept="image/*" onchange="uploadAssetFromInput(this,'image')" style="flex:1;min-width:190px">
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:5px">แนะนำ 1200 × 630 px · ระบบจะอัปโหลดแล้วใส่ URL ให้อัตโนมัติ</div>`;
  }

  if(f === 'ไฟล์_URL'){
    return `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="url" name="${esc(f)}" value="${val}" placeholder="File URL / PDF URL" style="flex:1;min-width:220px">
      <input type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,image/*" onchange="uploadAssetFromInput(this,'file')" style="flex:1;min-width:190px">
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:5px">แนบ PDF/เอกสารได้ · ระบบจะอัปโหลดแล้วใส่ URL ให้อัตโนมัติ</div>`;
  }

  const type=/วัน|date/i.test(f)?'date':(/เวลา/.test(f)?'time':'text');
  const opts=optionPool(f);
  const listId=opts.length?`list-${f.replace(/[^a-zA-Z0-9ก-๙_]/g,'')}`:'';
  const extra=f==='ประเทศ'?' oninput="onCountryInput(this)" onchange="onCountryInput(this)"':(f==='ทวีป'?' placeholder="เลือกประเทศแล้วระบบจะเติมให้อัตโนมัติ"':'');
  return `<input type="${type}" name="${esc(f)}" value="${val}" placeholder="${esc(f)}" ${listId?`list="${listId}"`:''}${extra}>`;
}
function dataListsForFields(fields){return fields.map(f=>{const opts=optionPool(f); if(!opts.length)return ''; const id=`list-${f.replace(/[^a-zA-Z0-9ก-๙_]/g,'')}`; return `<datalist id="${id}">${opts.map(o=>`<option value="${esc(o)}"></option>`).join('')}</datalist>`;}).join('');}
function openForm(key,id=null){const rows=state.data[key]||[]; const row=id?rows.find(r=>String(r.ID)===String(id)):null; state.editing={key,id,row}; $('#modalTitle').textContent=(id?'แก้ไข':'เพิ่ม')+' '+({mou:'MOU',scholar:'ทุน',event:'กิจกรรม',travel:'การเดินทาง',inbound:'Inbound',outbound:'Outbound'}[key]||key); const fields=FIELDS[key]||[]; $('#formFields').innerHTML=fields.map(f=>`<div class="field ${['หมายเหตุ','รายละเอียด','ครอบคลุม'].includes(f)?'full':''}"><label>${esc(f)}</label>${fieldInput(f,row)}</div>`).join('')+dataListsForFields(fields); $('#modalBackdrop').classList.add('show');}
function closeModal(){ $('#modalBackdrop').classList.remove('show'); state.editing=null; }
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
    reader.readAsDataURL(file);
  });
}
async function uploadAssetFromInput(input, kind='file'){
  const file = input.files && input.files[0];
  if(!file) return;
  const urlInput = input.parentElement.querySelector('input[type="url"]');
  const oldText = input.dataset.status || '';
  input.disabled = true;
  try{
    const base64 = await fileToBase64(file);
    const res = await fetch(IROUP.SCRIPT_URL,{
      method:'POST',
      body:JSON.stringify({
        action: kind === 'image' ? 'uploadImage' : 'uploadFile',
        base64,
        fileName:file.name
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    const url = data.url || data.fileUrl || data.webViewLink || '';
    if(!url) throw new Error('อัปโหลดแล้วแต่ไม่ได้รับ URL กลับมา');
    urlInput.value = url;
    alert(kind === 'image' ? 'อัปโหลด Poster สำเร็จ' : 'อัปโหลดไฟล์สำเร็จ');
  }catch(err){
    alert('อัปโหลดไม่สำเร็จ: ' + err.message);
  }finally{
    input.disabled = false;
  }
}
async function submitForm(e){e.preventDefault(); const {key,id}=state.editing; const data={}; new FormData(e.target).forEach((v,k)=>data[k]=v);
  if(key === 'scholar'){
    const coverage = Array.from(e.target.querySelectorAll('.coverage-check:checked')).map(x=>x.value);
    data['ครอบคลุม'] = coverage.join(', ');
  }
  if(data['หน่วยงาน_UP']) data['หน่วยงาน_UP']=normalizeFaculty(data['หน่วยงาน_UP']);
  if(data['คณะ']) data['คณะ']=normalizeFaculty(data['คณะ']);
  if(data['หน่วยงาน']) data['หน่วยงาน']=normalizeFaculty(data['หน่วยงาน']);
  if(data['ประเทศ']) { data['ประเทศ']=normalizeCountry(data['ประเทศ']); const cont=continentOfCountry(data['ประเทศ']); if(cont) data['ทวีป']=cont; }
  $('#modalSubmit').disabled=true; $('#modalSubmit').textContent='กำลังบันทึก...'; try{let res=id?await IROUP.edit(SHEETS[key],id,data):await IROUP.add(SHEETS[key],data); if(res.error)throw new Error(res.error); closeModal(); await loadCore(); render(); alert('บันทึกสำเร็จ');}catch(err){alert('บันทึกไม่สำเร็จ: '+err.message);}finally{$('#modalSubmit').disabled=false; $('#modalSubmit').textContent='บันทึก';}}
async function removeRow(key,id){if(!id)return alert('ไม่พบ ID'); if(!confirm('ยืนยันลบรายการนี้?'))return; try{const res=await IROUP.delete(SHEETS[key],id); if(res.error)throw new Error(res.error); await loadCore(); render();}catch(e){alert('ลบไม่สำเร็จ: '+e.message)}}
function exportCsv(key){const rows=state.data[key]||[]; if(!rows.length)return alert('ไม่มีข้อมูล'); const headers=Object.keys(rows[0]); const csv=[headers.join(','),...rows.map(r=>headers.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(','))].join('\n'); const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`iroup-${key}.csv`; a.click(); URL.revokeObjectURL(a.href);}
$$('.nav-btn').forEach(b=>b.addEventListener('click',()=>setPage(b.dataset.page))); $('#menuBtn').addEventListener('click',()=>$('#sidebar').classList.toggle('open')); $('#modalClose').addEventListener('click',closeModal); $('#modalCancel').addEventListener('click',closeModal); $('#modalForm').addEventListener('submit',submitForm); $$('.lang button').forEach(b=>b.addEventListener('click',()=>{$$('.lang button').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.lang=b.dataset.lang;}));
(function initUser(){try{const u=JSON.parse(localStorage.getItem('iroup_user')||'{}'); if(u.name)$('#userName').textContent=u.name; if(u.email)$('#userMail').textContent=u.email; if(u.name||u.email)$('#avatar').textContent=(u.name||u.email||'A')[0].toUpperCase();}catch(e){}})();
loadCore().then(render).catch(e=>{$('#content').innerHTML=errorBox('โหลด Dashboard ไม่สำเร็จ: '+e.message)});
</script>
</body>
